<div class="tree-container">
  @if (loading()) {
    <div class="status-message">
      <mat-icon class="spinner">refresh</mat-icon>
      <p>Cargando categorías...</p>
    </div>
  }

  @if (errorMessage()) {
    <div class="error-panel">
      <mat-icon color="warn">error_outline</mat-icon>
      <div class="error-text">
        <strong>Error de conexión</strong>
        <p>{{ errorMessage() }}</p>
      </div>
      <button mat-stroked-button color="primary" (click)="loadData()">
        Reintentar
      </button>
    </div>
  }

  @if (!loading() && !errorMessage()) {
    <mat-tree #tree [dataSource]="dataSource" [childrenAccessor]="childrenAccessor" class="category-tree">
      <mat-tree-node *matTreeNodeDef="let node" matTreeNodeToggle>
        <div class="node-item">
          <button mat-icon-button disabled>
            <mat-icon class="leaf-icon">chevron_right</mat-icon>
          </button>
          <span class="node-name">{{node.name}}</span>
        </div>
      </mat-tree-node>
      <mat-nested-tree-node *matTreeNodeDef="let node; when: hasChild">
        <div class="mat-tree-node">
          <button mat-icon-button matTreeNodeToggle>
            <mat-icon>
              {{ tree.isExpanded(node) ? 'expand_more' : 'chevron_right' }}
            </mat-icon>
          </button>
          <span class="node-name"><strong>{{node.name}}</strong></span>
        </div>
        <div [class.tree-invisible]="!tree.isExpanded(node)" class="nested-group" role="group">
          <ng-container matTreeNodeOutlet></ng-container>
        </div>
      </mat-nested-tree-node>
    </mat-tree>
  }
</div>
